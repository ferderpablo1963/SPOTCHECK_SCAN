<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    
    <title>SPOT CHECK - LOBBY 1225</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; overscroll-behavior: none; background-color: #f8fafc; }
        #main-scroll { overflow: auto; position: relative; background-color: #e2e8f0; height: calc(100vh - 205px); }
        #map-container { height: 1200px; width: 2000px; position: relative; background-color: #ffffff; transition: transform 0.2s ease; transform-origin: top left; }
        .mesa { position: absolute; border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); cursor: pointer; transition: all 0.2s; user-select: none; transform: translate(-50%, -50%); }
        .mesa-free { background-color: #ffffff; color: #64748b; border: 3px solid #e2e8f0; }
        .mesa-occupied { background-color: #020617 !important; color: #ffffff !important; border: 3px solid #020617; }
        .mesa-indet { background-color: #ef4444 !important; color: #ffffff !important; border: 3px solid #ef4444; }
        .screen-overlay { position: fixed; left: 0; right: 0; bottom: 0; top: 205px; background-color: #f8fafc; z-index: 100; overflow-y: auto; display: none; }
        .screen-overlay.active { display: flex; flex-direction: column; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-900 select-none">

    <header class="bg-slate-950 text-white p-6 pt-12 flex justify-between items-center shrink-0 z-[110] border-b border-slate-900">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                <i class="fa-solid fa-layer-group text-slate-950 text-2xl"></i>
            </div>
            <div>
                <h1 class="font-black text-2xl italic uppercase tracking-tight">SPOT CHECK</h1>
                <p class="text-[9px] text-slate-400 font-black tracking-widest uppercase">1225 LOBBY BAR</p>
            </div>
        </div>
        <button onclick="toggleLock()" id="lock-btn" class="flex items-center gap-3 px-5 py-2.5 bg-slate-900 rounded-2xl border border-slate-800 shadow-inner">
            <span id="lock-text" class="text-[10px] font-black uppercase text-slate-400 tracking-wider">EDICIÓN</span>
            <i class="fa-solid fa-unlock text-emerald-400" id="lock-icon"></i>
        </button>
    </header>

    <div class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center z-50 shrink-0 shadow-sm">
        <div class="flex gap-6">
            <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Mesa In Situ</p><p id="stat-occupied" class="text-xl font-black text-slate-950">0</p></div>
            <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Ocupación</p><p id="stat-percent" class="text-xl font-black text-emerald-600">0%</p></div>
        </div>
        <div class="flex items-center gap-3">
            <label class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 px-4 py-2.5 rounded-xl text-xs font-black uppercase cursor-pointer flex items-center gap-2 shadow-md shadow-emerald-500/10 active:scale-95 transition-transform">
                <i id="ocr-icon" class="fa-solid fa-camera"></i> <span id="ocr-text">SCAN</span>
                <input type="file" id="ocr-camera-input" accept="image/*" capture="environment" class="hidden" onchange="handleOCR(this)">
            </label>
            <button onclick="toggleFit()" class="bg-slate-100 text-slate-700 px-4 py-2.5 rounded-xl text-xs font-black uppercase active:scale-95 transition-transform">FIT</button>
        </div>
    </div>

    <nav class="px-6 py-3 bg-slate-50 flex gap-2 z-40 border-b border-slate-200 shrink-0">
        <button onclick="setMode('audit')" id="nav-audit" class="flex-1 py-3 rounded-xl font-black text-xs uppercase bg-white shadow-sm text-slate-950 border-b-2 border-emerald-500 transition-all">Auditar</button>
        <button onclick="setMode('notes')" id="nav-notes" class="flex-1 py-3 rounded-xl font-black text-xs uppercase text-slate-400 transition-all">Reporte</button>
        <button onclick="setMode('history')" id="nav-history" class="flex-1 py-3 rounded-xl font-black text-xs uppercase text-slate-400 transition-all">Historial</button>
    </nav>

    <main class="flex-1 overflow-hidden" id="main-scroll">
        <div id="map-container">
            <div id="mesas-layer" class="w-full h-full"></div>
        </div>
    </main>

    <div id="notes-screen" class="screen-overlay p-6">
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 max-w-md mx-auto w-full space-y-5">
            <div class="text-center border-b border-slate-100 pb-4">
                <h3 class="text-xs font-black uppercase italic tracking-wider">PREPARACIÓN DE REPORTE</h3>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">Mesa In Situ</label>
                    <div id="note-insitu" class="w-full p-4 bg-slate-50 rounded-2xl font-black text-center text-lg border border-slate-100 text-slate-900">0</div>
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-1">Sistema POS</label>
                    <input id="note-micros" type="number" placeholder="Cant." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-black text-center text-lg focus:outline-emerald-500">
                </div>
            </div>
            <button onclick="saveAudit()" class="w-full bg-slate-950 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl shadow-slate-950/10 active:scale-[0.98] transition-transform">Guardar e Historial</button>
        </div>
    </div>

    <div id="history-screen" class="screen-overlay p-6">
        <div class="max-w-md mx-auto w-full">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black uppercase italic text-lg tracking-tight">Historial de Controles</h2>
                <button onclick="clearHistory()" class="text-red-500 font-black text-xs uppercase tracking-wider bg-red-50 px-3 py-1.5 rounded-xl">Borrar Todo</button>
            </div>
            <div id="history-list" class="space-y-4"></div>
        </div>
    </div>

    <footer id="main-footer" class="p-4 bg-white border-t border-slate-200 shrink-0 z-50 shadow-lg">
        <div class="flex gap-3 max-w-md mx-auto">
            <button onclick="setMode('notes')" class="flex-1 bg-slate-950 hover:bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl shadow-slate-950/10 active:scale-[0.98] transition-transform tracking-wider">Generar Reporte</button>
            <button onclick="clearCurrent()" class="px-6 bg-slate-100 hover:bg-slate-200 text-slate-400 hover:text-slate-600 rounded-2xl active:scale-[0.98] transition-transform"><i class="fa-solid fa-rotate-right text-sm"></i></button>
        </div>
    </footer>

    <div id="toast" class="bg-slate-900 text-white px-6 py-3.5 rounded-2xl font-black text-xs uppercase shadow-2xl border border-slate-800">
        <span id="toast-msg"></span>
    </div>

    <script>
        const DB_PREFIX = 'spotcheck_1225_lobby';
        let tables = [];
        let audits = JSON.parse(localStorage.getItem(`${DB_PREFIX}_audits`)) || [];
        let isLocked = false;
        let currentMode = 'audit', draggingId = null;

        function createInitialLayout() {
            const mapData = [
                {l:"4", x:801, y:191}, {l:"5", x:867, y:192}, {l:"6", x:930, y:191}, {l:"7", x:994, y:190},
                {l:"8", x:1120, y:301}, {l:"9", x:1181, y:300},
                {l:"33", x:461, y:314}, {l:"30", x:591, y:344},
                {l:"34", x:485, y:461}, {l:"31", x:609, y:461},
                {l:"20", x:864, y:492}, {l:"21", x:927, y:493},
                {l:"23", x:865, y:611}, {l:"22", x:929, y:611},
                {l:"10", x:1118, y:534}, {l:"11", x:1118, y:654},
                {l:"24", x:722, y:703}, {l:"32", x:559, y:762}, {l:"25", x:885, y:778}
            ];
            tables = mapData.map((m, i) => ({ id: i, x: m.x, y: m.y, label: m.l, status: 'free', w: 52, h: 52 }));
            saveData();
        }

        function init() {
            const saved = localStorage.getItem(`${DB_PREFIX}_tables`);
            if (!saved) createInitialLayout(); else tables = JSON.parse(saved);
            
            isLocked = false;
            document.getElementById('lock-icon').className = 'fa-solid fa-unlock text-emerald-400';
            document.getElementById('lock-text').innerText = 'EDICIÓN';
            document.getElementById('lock-text').className = 'text-[10px] font-black uppercase text-emerald-500 tracking-wider';

            render();
            
            window.addEventListener('pointermove', (e) => {
                if (draggingId !== null && !isLocked) {
                    const t = tables.find(x => x.id === draggingId);
                    const rect = document.getElementById('map-container').getBoundingClientRect();
                    const computedScale = rect.width / 2000;
                    t.x = (e.clientX - rect.left) / computedScale;
                    t.y = (e.clientY - rect.top) / computedScale;
                    render();
                }
            });
            window.addEventListener('pointerup', () => { if(draggingId !== null) { draggingId = null; saveData(); } });
        }

        function render() {
            const layer = document.getElementById('mesas-layer');
            layer.innerHTML = '';
            let count = 0;
            tables.forEach(t => {
                if(t.status !== 'free') count++;
                const div = document.createElement('div');
                div.className = `mesa ${t.status === 'occupied' ? 'mesa-occupied' : (t.status === 'indet' ? 'mesa-indet' : 'mesa-free')}`;
                div.style.cssText = `left:${t.x}px; top:${t.y}px; width:${t.w}px; height:${t.h}px;`;
                div.innerHTML = `<span>${t.label}</span>`;
                div.onpointerdown = (e) => {
                    if (!isLocked) { draggingId = t.id; }
                    else if (currentMode === 'audit') {
                        t.status = t.status === 'free' ? 'occupied' : (t.status === 'occupied' ? 'indet' : 'free');
                        saveData(); render();
                    }
                };
                layer.appendChild(div);
            });
            document.getElementById('stat-occupied').innerText = count;
            document.getElementById('stat-percent').innerText = Math.round((count/tables.length)*100) + '%';
            if(document.getElementById('note-insitu')) document.getElementById('note-insitu').innerText = count;
        }

        function setMode(m) {
            currentMode = m;
            document.getElementById('nav-audit').className = `flex-1 py-3 rounded-xl font-black text-xs uppercase transition-all ${m==='audit'?'bg-white shadow-sm text-slate-950 border-b-2 border-emerald-500':'text-slate-400'}`;
            document.getElementById('nav-notes').className = `flex-1 py-3 rounded-xl font-black text-xs uppercase transition-all ${m==='notes'?'bg-white shadow-sm text-slate-950 border-b-2 border-emerald-500':'text-slate-400'}`;
            document.getElementById('nav-history').className = `flex-1 py-3 rounded-xl font-black text-xs uppercase transition-all ${m==='history'?'bg-white shadow-sm text-slate-950 border-b-2 border-emerald-500':'text-slate-400'}`;
            
            document.getElementById('notes-screen').classList.toggle('active', m === 'notes');
            document.getElementById('history-screen').classList.toggle('active', m === 'history');
            document.getElementById('main-footer').style.display = (m === 'history' || m === 'notes') ? 'none' : 'block';
            
            if(m === 'history') renderHistory();
            render();
        }

        function toggleLock() {
            isLocked = !isLocked;
            document.getElementById('lock-icon').className = isLocked ? 'fa-solid fa-lock text-red-500' : 'fa-solid fa-unlock text-emerald-400';
            document.getElementById('lock-text').innerText = isLocked ? 'BLOQUEADO' : 'EDICIÓN';
            document.getElementById('lock-text').className = isLocked ? 'text-[10px] font-black uppercase text-slate-400 tracking-wider' : 'text-[10px] font-black uppercase text-emerald-500 tracking-wider';
            showToast(isLocked ? "Modo Auditoría (Mapa Fijo)" : "Modo Ajuste Layout");
        }

        function toggleFit() {
            const c = document.getElementById('map-container');
            c.style.transform = (c.style.transform.includes('scale(1)') || !c.style.transform) ? `scale(${window.innerWidth/2000})` : 'scale(1)';
        }

        function saveAudit() {
            audits.unshift({
                id: Date.now(),
                date: new Date().toLocaleDateString(),
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                insitu: parseInt(document.getElementById('note-insitu').innerText),
                micros: parseInt(document.getElementById('note-micros').value)||0
            });
            saveData();
            setMode('history');
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = audits.map(a => `
                <div class="bg-white p-6 rounded-3xl border flex justify-between items-center shadow-sm">
                    <div>
                        <p class="text-[10px] text-emerald-500 font-bold">${a.date} ${a.time}</p>
                        <h4 class="font-black italic text-slate-900">POS: ${a.micros} | REAL: ${a.insitu}</h4>
                    </div>
                </div>
            `).join('');
        }

        // =========================================================================
        // ALGORITMO OCR CORREGIDO: EXTRAE LOS NÚMEROS DE MESA CORRECTOS ANTES DE LA "/"
        // =========================================================================
        async function handleOCR(input) {
            const file = input.files[0]; if (!file) return;
            const textEl = document.getElementById('ocr-text');
            const ocrIcon = document.getElementById('ocr-icon');
            
            textEl.innerText = "LEYENDO...";
            if(ocrIcon) ocrIcon.className = "fa-solid fa-spinner fa-spin";

            try {
                const result = await Tesseract.recognize(file, 'eng');
                let text = result.data.text;
                
                text = text.replace(/(?:Tb1|7bl|Thl|Ibl|1bl|lb1)/gi, 'Tbl');
                
                // Expresión calibrada para extraer el número justo antes de la barra "/"
                const regex = /Tbl\s+(\d+)\//g; 
                
                let match;
                let count = 0;
                
                tables.forEach(t => t.status = 'free');

                while ((match = regex.exec(text)) !== null) {
                    const tableNum = match[1]; // Captura el 90, 10, 41, 8, 22...
                    
                    const target = tables.find(t => t.label === tableNum);
                    if (target) { 
                        target.status = 'occupied'; 
                        count++; 
                    }
                }

                if (count > 0) {
                    showToast(`SINCRO: ${count} MESAS ACTIVAS`);
                } else {
                    const fallbackRegex = /(\d+)\//g;
                    while ((match = fallbackRegex.exec(text)) !== null) {
                        const target = tables.find(t => t.label === match[1]);
                        if (target) { target.status = 'occupied'; count++; }
                    }
                    showToast(count > 0 ? `SINCRO RESPALDO: ${count} MESAS` : "NO SE DETECTARON MESAS");
                }
            } catch (e) { 
                console.error(e);
                showToast("ERROR DE LECTURA OCR"); 
            } finally {
                textEl.innerText = "SCAN"; 
                if(ocrIcon) ocrIcon.className = "fa-solid fa-camera";
                render(); 
                saveData();
                input.value = "";
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            const msgEl = document.getElementById('toast-msg');
            if (t && msgEl) {
                msgEl.innerText = msg;
                t.classList.add('show'); 
                setTimeout(() => t.classList.remove('show'), 2500);
            }
        }

        function saveData() {
            localStorage.setItem(`${DB_PREFIX}_tables`, JSON.stringify(tables));
            localStorage.setItem(`${DB_PREFIX}_audits`, JSON.stringify(audits));
        }

        function clearCurrent() { 
            if(confirm("¿Resetear conteo actual?")) { 
                tables.forEach(t => t.status = 'free'); 
                render(); 
                saveData(); 
            } 
        }

        function clearHistory() { 
            if(confirm("¿Borrar todo el historial de reportes?")) { 
                audits = []; 
                if (typeof renderHistory === 'function') renderHistory(); 
                saveData(); 
            } 
        }

        init();
    </script>
</body>
</html>
